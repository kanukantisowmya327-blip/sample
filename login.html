Here's a simple and responsive login.html page using HTML and CSS.

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .login-box{
            background:#fff;
            padding:30px;
            border-radius:10px;
            width:350px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group label{
            display:block;
            margin-bottom:5px;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            outline:none;
        }

        .input-group input:focus{
            border-color:#4facfe;
        }

        button{
            width:100%;
            padding:10px;
            border:none;
            background:#4facfe;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#3399ff;
        }

        .links{
            text-align:center;
            margin-top:15px;
        }

        .links a{
            text-decoration:none;
            color:#4facfe;
        }

        .links a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Login</h2>

        <form action="login.php" method="POST">
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit">Login</button>

            <div class="links">
                <p><a href="#">Forgot Password?</a></p>
                <p>Don't have an account? <a href="register.html">Sign Up</a></p>
            </div>
        </form>
    </div>

</body>
</html>
